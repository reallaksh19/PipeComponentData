name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - db-core-development
      - 'phase-*'
      - 'db-*'
  pull_request:
    branches:
      - main
      - db-core-development

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }} gates
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run cumulative gates
        run: npm test

      - name: Run DB gates when present
        run: npm run db:test --if-present

  gate-map:
    name: Gate map report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run available gate scripts individually
        shell: bash
        run: |
          set +e
          status=0
          scripts=$(node -e "const p=require('./package.json'); const keys=Object.keys(p.scripts||{}).filter(k => /^gate:phase\d+$|^db:gate\d+$/.test(k)); const n=s => Number((s.match(/\d+$/)||['0'])[0]); console.log(keys.sort((a,b)=>a.startsWith('db:')-b.startsWith('db:') || n(a)-n(b)).join(' '))")
          for script in $scripts; do
            echo "::group::$script"
            npm run "$script"
            code=$?
            echo "exit_code=$code"
            echo "::endgroup::"
            if [ "$code" -ne 0 ]; then status=1; fi
          done
          if [ "$status" -ne 0 ]; then
            echo "::warning::One or more exploratory gate-map scripts failed. The blocking Node gates job remains the source of truth."
          fi
          exit 0
