name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - db-core-development
      - 'phase-*'
      - 'db-*'
  pull_request:
    branches:
      - main
      - db-core-development

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Node ${{ matrix.node-version }} gates
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run cumulative gates
        run: npm test

      - name: Run DB gates when present
        run: npm run db:test --if-present

  gate-map:
    name: Gate map report
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run available gate scripts individually
        shell: bash
        run: |
          set +e
          status=0
          for script in $(node -e "const p=require('./package.json'); console.log(Object.keys(p.scripts||{}).filter(k => /^gate:phase\d+$|^db:gate\d+$/.test(k)).sort().join(' '))"); do
            echo "::group::$script"
            npm run "$script"
            code=$?
            echo "exit_code=$code"
            echo "::endgroup::"
            if [ "$code" -ne 0 ]; then status=1; fi
          done
          exit "$status"
