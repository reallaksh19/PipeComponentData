name: Source Expansion Wave 1

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - 'source-expansion-*'
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: source-expansion-wave-1-${{ github.ref }}
  cancel-in-progress: true

jobs:
  wave1-gates:
    name: Node ${{ matrix.node-version }} source expansion wave gates
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20.x
          - 22.x
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install dependencies
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
      - name: Run DB Phase 28 direct expanded index gate
        run: node --test gates/db-phase-28-expanded-index-consistency.gate.test.js
      - name: Run DB Phase 61 pipe SCH80 wave 4 promotion gate
        run: node --test gates/db-phase-61-pipe-sch80-wave4.gate.test.js
      - name: Run DB Phase 62 flange CL600 wave 4 promotion gate
        run: node --test gates/db-phase-62-flange-cl600-wave4.gate.test.js
      - name: Run DB Phase 63 blocked families gate
        run: node --test gates/db-phase-63-blocked-families.gate.test.js
